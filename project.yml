name: Gridly
options:
  bundleIdPrefix: com.gridly
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Gridly:
    type: application
    platform: macOS
    sources:
      - Sources/Gridly
    settings:
      base:
        PRODUCT_NAME: Gridly
        PRODUCT_BUNDLE_IDENTIFIER: com.gridly.app
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Gridly.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Signing — ad-hoc by default; override for distribution (see CLAUDE.md)
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "YES"
      configs:
        Release:
          # Override at build time via xcodebuild settings or update these values:
          #   DEVELOPMENT_TEAM: <10-char team ID from developer.apple.com>
          #   CODE_SIGN_IDENTITY: "Developer ID Application"
          #   CODE_SIGNING_REQUIRED: "YES"
          CODE_SIGN_STYLE: Manual
    scheme: {}
